# === Adatbázis ===
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:ingatlan}
quarkus.datasource.password=${DB_PASSWORD:ingatlan}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/ingatlan_db}

# === Hibernate ORM ===
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# === HTTP ===
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*

# === OpenAPI / Swagger ===
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=Ingatlanközvetítő API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Ingatlanközvetítő szoftver REST API

# === JWT ===
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=ingatlan-backend
smallrye.jwt.sign.key.location=privateKey.pem

# === HTTP biztonság ===
# Az összes /api/v1/* végpont JWT tokent igényel, kivéve a bejelentkezés
quarkus.http.auth.permission.authenticated.paths=/api/v1/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/api/v1/auth/bejelentkezes
quarkus.http.auth.permission.public.policy=permit

# Szerepkörök: ADMIN | IRODAVEZETO | REFERENS | ASSZISZTENS
# (A finomabb @RolesAllowed szabályozás a Resource osztályokban van)

# === Logging ===
quarkus.log.level=INFO
quarkus.log.category."hu.ingatlan".level=DEBUG

# === Test profil ===
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=no-file
# Teszteléshez a dev kulcsokat újrahasználjuk (classpath-on érhetők el)
%test.smallrye.jwt.sign.key.location=privateKey.pem
%test.mp.jwt.verify.publickey.location=publicKey.pem
