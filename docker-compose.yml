version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ingatlan-db
    environment:
      POSTGRES_DB: ingatlan_db
      POSTGRES_USER: ingatlan
      POSTGRES_PASSWORD: ingatlan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingatlan -d ingatlan_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
